<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover" />
    
    <!-- Theme colors for mobile browsers -->
    <meta name="theme-color" content="#000000" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: light)" />
    
    <!-- iOS Safari specific -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/apple-touch-icon.png" />
    <link rel="manifest" href="/assets/images/site.webmanifest" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Text&display=swap" rel="stylesheet" />
    
    <title>YourTrips</title>
    
    <!-- Load Ionicons font from CDN for web -->
    <style>
      @font-face {
        font-family: 'Ionicons';
        src: url('https://unpkg.com/@expo/vector-icons@15.0.3/build/vendor/react-native-vector-icons/Fonts/Ionicons.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }
      
      /* Alias for DM Serif Text to match native font name */
      @font-face {
        font-family: 'DMSerifText-Regular';
        src: local('DM Serif Text'), local('DMSerifText-Regular');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }
      
      html, body {
        background-color: #1a1a1a;
        margin: 0;
        padding: 0;
        height: 100%;
      }
      
      #root {
        height: 100%;
        background-color: #1a1a1a;
      }
      

    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
